source.. = src/
output.. = bin/
bin.includes = META-INF/,\
               .,\
               plugin.xml,\
               lib/dbmeow-core.jar
# lib/dbmeow-core.jar is the tested core engine, embedded on the
# Bundle-ClassPath. It is a build artifact — see BUILD.md for the one command
# that produces and stages it before the Tycho build.
jars.extra.classpath = lib/dbmeow-core.jar
